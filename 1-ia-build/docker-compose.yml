services:
  app:
    image: rps/ia-build:1.0.0
    tty: true
    ports:
      - "8501:8501"
    volumes:
      - ../models:/app/models
      - ../data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    shm_size: '1gb'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G